components:
  schemas:
    AshkaalAssertion:
      properties:
        assertion_id:
          type: string
        class_id:
          type: string
        description:
          type: string
        evidence:
          items:
            $ref: "#/components/schemas/AshkaalEvidence"
          type: array
        id:
          $ref: "#/components/schemas/AshkaalAssertionID"
        result:
          $ref: "#/components/schemas/AshkaalAssertionResult"
      required:
        - id
        - result
      type: object
    AshkaalAssertionID:
      enum:
        - no_bad_egress_domain
        - no_bad_ingress_domain
        - no_bad_local_domain
      type: string
    AshkaalAssertionResult:
      enum:
        - pass
        - attention
        - fail
      type: string
    AshkaalAttenuator:
      properties:
        attenuated_by:
          type: string
        interpretation:
          type: string
        is_false_positive:
          type: boolean
        new_confidence:
          format: double
          type: number
        new_risk_score:
          format: double
          type: number
        new_severity:
          type: integer
        new_severity_level:
          type: string
        thinking:
          type: string
      required:
        - attenuated_by
        - interpretation
        - is_false_positive
        - new_confidence
        - new_risk_score
        - new_severity
        - new_severity_level
      type: object
    AshkaalBackground:
      allOf:
        - $ref: "#/components/schemas/AshkaalBackgroundValue"
      nullable: true
      type: object
    AshkaalBackgroundValue:
      properties:
        ancestry:
          items:
            $ref: "#/components/schemas/AshkaalProcessValue"
          type: array
        containers:
          $ref: "#/components/schemas/AshkaalContainerAggregate"
        file_list:
          items:
            $ref: "#/components/schemas/AshkaalFile"
          type: array
        files:
          $ref: "#/components/schemas/AshkaalFileAggregate"
        flow_list:
          items:
            $ref: "#/components/schemas/AshkaalFlow"
          type: array
        flows:
          $ref: "#/components/schemas/AshkaalFlowAggregate"
      type: object
    AshkaalBase:
      allOf:
        - $ref: "#/components/schemas/AshkaalBaseValue"
      nullable: true
      type: object
    AshkaalBaseValue:
      properties:
        attenuator:
          $ref: "#/components/schemas/AshkaalAttenuator"
        background:
          $ref: "#/components/schemas/AshkaalBackgroundValue"
        metadata:
          $ref: "#/components/schemas/AshkaalMetadataValue"
        note:
          type: string
        scenarios:
          $ref: "#/components/schemas/AshkaalScenarios"
        score:
          $ref: "#/components/schemas/AshkaalScore"
        timestamp:
          format: date-time
          type: string
        uuid:
          type: string
      required:
        - timestamp
        - uuid
      type: object
    AshkaalContainer:
      properties:
        cgroupns_mode:
          type: string
        cmd:
          items:
            type: string
          type: array
        created_at:
          format: date-time
          type: string
        cwd:
          type: string
        driver:
          type: string
        env:
          items:
            type: string
          type: array
        exit_code:
          type: integer
        finished_at:
          format: date-time
          type: string
        hostname:
          type: string
        id:
          type: string
        image:
          type: string
        image_id:
          type: string
        ipc_mode:
          type: string
        is_attached:
          type: boolean
        mounts:
          items:
            $ref: "#/components/schemas/AshkaalMount"
          type: array
        name:
          type: string
        namespaces:
          $ref: "#/components/schemas/AshkaalNamespaces"
        network_mode:
          type: string
        path:
          type: string
        pid:
          type: integer
        pid_mode:
          type: string
        runtime:
          type: string
        started_at:
          format: date-time
          type: string
        status:
          type: string
        userns_mode:
          type: string
        uts_mode:
          type: string
        version:
          type: string
      required:
        - id
      type: object
    AshkaalContainerAggregate:
      properties:
        cgroup_namespace_ids:
          items:
            $ref: "#/components/schemas/AshkaalContainerPair"
          type: array
        containers:
          items:
            $ref: "#/components/schemas/AshkaalContainer"
          type: array
        ipc_namespace_ids:
          items:
            $ref: "#/components/schemas/AshkaalContainerPair"
          type: array
        mnt_namespace_ids:
          items:
            $ref: "#/components/schemas/AshkaalContainerPair"
          type: array
        net_namespace_ids:
          items:
            $ref: "#/components/schemas/AshkaalContainerPair"
          type: array
        pid_namespace_ids:
          items:
            $ref: "#/components/schemas/AshkaalContainerPair"
          type: array
        uts_namespace_ids:
          items:
            $ref: "#/components/schemas/AshkaalContainerPair"
          type: array
      type: object
    AshkaalContainerPair:
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
      type: object
    AshkaalDigestedDetection:
      properties:
        assertion_id:
          type: string
        metadata:
          $ref: "#/components/schemas/AshkaalMetadataValue"
        proc_trees:
          items:
            $ref: "#/components/schemas/AshkaalProcessTree"
          type: array
        result:
          $ref: "#/components/schemas/AshkaalAssertionResult"
        score:
          $ref: "#/components/schemas/AshkaalScore"
      type: object
    AshkaalDirection:
      properties:
        domains:
          items:
            type: string
          type: array
        peers:
          items:
            $ref: "#/components/schemas/AshkaalPeer"
          type: array
      type: object
    AshkaalDirectionNetTelemetry:
      properties:
        total_connections:
          minimum: 0
          type: integer
        total_domains:
          minimum: 0
          type: integer
      required:
        - total_connections
        - total_domains
      type: object
    AshkaalEvidence:
      properties:
        event_name:
          type: string
        peer:
          $ref: "#/components/schemas/AshkaalPeer"
        timestamp:
          format: date-time
          type: string
      required:
        - event_name
        - timestamp
      type: object
    AshkaalFSDir:
      properties:
        base:
          type: string
        dir_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        dirs:
          items:
            $ref: "#/components/schemas/AshkaalFSDir"
          type: array
        files:
          items:
            $ref: "#/components/schemas/AshkaalFSFile"
          type: array
        path:
          type: string
      type: object
    AshkaalFSFile:
      properties:
        actions:
          items:
            type: string
          nullable: true
          type: array
        base:
          type: string
        base_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        dir_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        file_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        metadata:
          $ref: "#/components/schemas/AshkaalFileMetadata"
        mode:
          type: string
        owner:
          $ref: "#/components/schemas/AshkaalFileOwner"
        path:
          type: string
      required:
        - actions
        - base
        - base_hash
        - dir_hash
        - file_hash
        - mode
        - owner
        - path
      type: object
    AshkaalFile:
      properties:
        actions:
          $ref: "#/components/schemas/AshkaalFileActions"
        base_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        basename:
          type: string
        dir:
          type: string
        dir_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        file_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        metadata:
          $ref: "#/components/schemas/AshkaalFileMetadata"
        owner:
          $ref: "#/components/schemas/AshkaalFileOwner"
        path:
          type: string
        permissions:
          $ref: "#/components/schemas/AshkaalFilePermissions"
        type:
          type: string
        uuid:
          type: string
      required:
        - basename
        - dir
        - owner
        - path
        - type
        - uuid
      type: object
    AshkaalFileActions:
      properties:
        actions:
          items:
            type: string
          type: array
        async:
          type: boolean
        close:
          type: boolean
        create:
          type: boolean
        exec:
          type: boolean
        flock:
          type: boolean
        fsync:
          type: boolean
        link:
          type: boolean
        mmap:
          type: boolean
        open:
          type: boolean
        read:
          type: boolean
        rename:
          type: boolean
        seek:
          type: boolean
        truncate:
          type: boolean
        unlink:
          type: boolean
        write:
          type: boolean
      type: object
    AshkaalFileAggregate:
      properties:
        root:
          $ref: "#/components/schemas/AshkaalFSDir"
      required:
        - root
      type: object
    AshkaalFileMetadata:
      properties:
        access:
          format: date-time
          type: string
        change:
          format: date-time
          type: string
        creation:
          format: date-time
          type: string
        size:
          format: int64
          type: integer
      required:
        - access
        - change
        - creation
      type: object
    AshkaalFileOwner:
      properties:
        gid:
          maximum: 4294967295
          minimum: 0
          type: integer
        uid:
          maximum: 4294967295
          minimum: 0
          type: integer
      required:
        - gid
        - uid
      type: object
    AshkaalFilePermissions:
      properties:
        group_exec:
          type: boolean
        group_read:
          type: boolean
        group_write:
          type: boolean
        mode:
          type: string
        other_exec:
          type: boolean
        other_read:
          type: boolean
        other_write:
          type: boolean
        owner_exec:
          type: boolean
        owner_read:
          type: boolean
        owner_write:
          type: boolean
        setgid:
          type: boolean
        setuid:
          type: boolean
        sticky:
          type: boolean
      required:
        - group_exec
        - group_read
        - group_write
        - mode
        - other_exec
        - other_read
        - other_write
        - owner_exec
        - owner_read
        - owner_write
        - setgid
        - setuid
        - sticky
      type: object
    AshkaalFlags:
      properties:
        egress:
          type: boolean
        ended:
          type: boolean
        incoming:
          type: boolean
        ingress:
          type: boolean
        ongoing:
          type: boolean
        outgoing:
          type: boolean
        started:
          type: boolean
        terminated:
          type: boolean
        terminator:
          type: boolean
      required:
        - egress
        - ended
        - incoming
        - ingress
        - ongoing
        - outgoing
        - started
        - terminated
        - terminator
      type: object
    AshkaalFlow:
      properties:
        flags:
          $ref: "#/components/schemas/AshkaalFlags"
        flow_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        icmp:
          $ref: "#/components/schemas/AshkaalICMP"
        ip_version:
          type: integer
        local:
          $ref: "#/components/schemas/AshkaalNode"
        phase:
          $ref: "#/components/schemas/AshkaalPhase"
        proto:
          type: string
        remote:
          $ref: "#/components/schemas/AshkaalNode"
        service_port:
          type: integer
        uuid:
          type: string
      required:
        - ip_version
        - proto
        - uuid
      type: object
    AshkaalFlowAggregate:
      properties:
        ip_version:
          type: integer
        protocols:
          items:
            $ref: "#/components/schemas/AshkaalProtocolAggregate"
          type: array
      type: object
    AshkaalGeoIPLocation:
      properties:
        asname:
          type: string
        city:
          type: string
        continent:
          type: string
        continent_code:
          type: string
        country:
          type: string
        country_code:
          type: string
        isp:
          type: string
        latitude:
          format: double
          type: number
        longitude:
          format: double
          type: number
        org:
          type: string
        region:
          type: string
        region_name:
          type: string
      type: object
    AshkaalICMP:
      properties:
        code:
          type: string
        type:
          type: string
      required:
        - code
        - type
      type: object
    AshkaalLocalRemotePair:
      properties:
        local:
          $ref: "#/components/schemas/AshkaalProtocolNode"
        remote:
          $ref: "#/components/schemas/AshkaalProtocolNode"
      required:
        - local
        - remote
      type: object
    AshkaalMetadata:
      allOf:
        - $ref: "#/components/schemas/AshkaalMetadataValue"
      nullable: true
      type: object
    AshkaalMetadataValue:
      properties:
        description:
          type: string
        documentation:
          type: string
        format:
          type: string
        importance:
          type: string
        kind:
          type: string
        name:
          type: string
        subtechnique:
          type: string
        tactic:
          type: string
        technique:
          type: string
        version:
          type: string
      required:
        - format
        - kind
        - name
        - version
      type: object
    AshkaalMount:
      properties:
        destination:
          type: string
        source:
          type: string
        type:
          type: string
      required:
        - destination
        - source
        - type
      type: object
    AshkaalNamespaces:
      properties:
        cgroup_ns:
          maximum: 4294967295
          minimum: 0
          type: integer
        ipc_ns:
          maximum: 4294967295
          minimum: 0
          type: integer
        mnt_ns:
          maximum: 4294967295
          minimum: 0
          type: integer
        net_ns:
          maximum: 4294967295
          minimum: 0
          type: integer
        pid_ns:
          maximum: 4294967295
          minimum: 0
          type: integer
        uts_ns:
          maximum: 4294967295
          minimum: 0
          type: integer
      type: object
    AshkaalNetProfile:
      properties:
        egress:
          $ref: "#/components/schemas/AshkaalDirection"
        ingress:
          $ref: "#/components/schemas/AshkaalDirection"
        local:
          $ref: "#/components/schemas/AshkaalDirection"
      type: object
    AshkaalNetTelemetry:
      nullable: true
      properties:
        egress:
          $ref: "#/components/schemas/AshkaalDirectionNetTelemetry"
        ingress:
          $ref: "#/components/schemas/AshkaalDirectionNetTelemetry"
        local:
          $ref: "#/components/schemas/AshkaalDirectionNetTelemetry"
      type: object
    AshkaalNode:
      properties:
        address:
          type: string
        name:
          type: string
        names:
          items:
            type: string
          type: array
        port:
          type: integer
      required:
        - address
        - name
        - port
      type: object
    AshkaalPeer:
      properties:
        detections:
          items:
            type: string
          nullable: true
          type: array
        local_address:
          type: string
        local_names:
          items:
            type: string
          type: array
        proc_trees:
          items:
            $ref: "#/components/schemas/AshkaalProcessTree"
          type: array
        protocol:
          type: string
        remote_address:
          type: string
        remote_geo_info:
          $ref: "#/components/schemas/AshkaalGeoIPLocation"
        remote_names:
          items:
            type: string
          type: array
        remote_ports:
          items:
            type: string
          type: array
        result:
          $ref: "#/components/schemas/AshkaalAssertionResult"
      required:
        - detections
        - local_address
        - protocol
        - remote_address
        - result
      type: object
    AshkaalPhase:
      properties:
        direction:
          type: string
        ended_by:
          type: string
        initiated_by:
          type: string
        status:
          type: string
      required:
        - direction
        - ended_by
        - initiated_by
        - status
      type: object
    AshkaalPortCommAgg:
      properties:
        dst_port:
          type: integer
        phase:
          $ref: "#/components/schemas/AshkaalPhase"
        src_port:
          type: integer
      required:
        - dst_port
        - src_port
      type: object
    AshkaalProcess:
      allOf:
        - $ref: "#/components/schemas/AshkaalProcessValue"
      nullable: true
      type: object
    AshkaalProcessTree:
      properties:
        ancestry:
          items:
            type: string
          type: array
        arguments:
          type: string
        executable:
          type: string
        github_step:
          type: string
        pid:
          maximum: 4294967295
          minimum: 0
          type: integer
        process:
          type: string
      type: object
    AshkaalProcessValue:
      properties:
        args:
          type: string
        args_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        cmd:
          type: string
        comm:
          type: string
        comm_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        envs:
          type: string
        envs_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        exe:
          type: string
        exe_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        exit:
          format: date-time
          type: string
        loader:
          type: string
        loader_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        namespaces:
          $ref: "#/components/schemas/AshkaalNamespaces"
        parent_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        pid:
          type: integer
        ppid:
          type: integer
        prev_args:
          type: string
        prev_args_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        prev_envs:
          type: string
        prev_envs_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        prev_exe:
          type: string
        prev_exe_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        prev_loader:
          type: string
        prev_loader_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        process_hash:
          maximum: 4294967295
          minimum: 0
          type: integer
        retcode:
          type: integer
        start:
          format: date-time
          type: string
        uid:
          minimum: 0
          type: integer
        uuid:
          type: string
      required:
        - cmd
        - comm
        - exe
        - exit
        - pid
        - ppid
        - retcode
        - start
        - uid
        - uuid
      type: object
    AshkaalProfile:
      nullable: true
      properties:
        assertions:
          items:
            $ref: "#/components/schemas/AshkaalAssertion"
          type: array
        attenuator:
          $ref: "#/components/schemas/AshkaalAttenuator"
        background:
          $ref: "#/components/schemas/AshkaalBackgroundValue"
        metadata:
          $ref: "#/components/schemas/AshkaalMetadataValue"
        network:
          $ref: "#/components/schemas/AshkaalNetProfile"
        note:
          type: string
        profile_detections:
          items:
            $ref: "#/components/schemas/AshkaalProfileDetection"
          type: array
        scenarios:
          $ref: "#/components/schemas/AshkaalScenarios"
        score:
          $ref: "#/components/schemas/AshkaalScore"
        telemetry:
          $ref: "#/components/schemas/AshkaalTelemetry"
        timestamp:
          format: date-time
          type: string
        uuid:
          type: string
      type: object
    AshkaalProfileDetection:
      properties:
        class_id:
          type: string
        digested_detections:
          items:
            $ref: "#/components/schemas/AshkaalDigestedDetection"
          type: array
      type: object
    AshkaalProtocolAggregate:
      properties:
        icmps:
          items:
            $ref: "#/components/schemas/AshkaalICMP"
          type: array
        pairs:
          items:
            $ref: "#/components/schemas/AshkaalProtocolLocalRemoteAgg"
          type: array
        proto:
          type: string
      type: object
    AshkaalProtocolLocalRemoteAgg:
      properties:
        nodes:
          $ref: "#/components/schemas/AshkaalLocalRemotePair"
        port_matrix:
          items:
            $ref: "#/components/schemas/AshkaalPortCommAgg"
          type: array
      type: object
    AshkaalProtocolNode:
      properties:
        address:
          type: string
        name:
          type: string
        names:
          items:
            type: string
          type: array
      required:
        - address
      type: object
    AshkaalScenarioGitHub:
      properties:
        action:
          type: string
        actor:
          type: string
        actor_id:
          type: string
        created_at:
          format: date-time
          type: string
        event_name:
          type: string
        id:
          type: string
        job:
          type: string
        ref:
          type: string
        ref_name:
          type: string
        ref_protected:
          type: string
        ref_type:
          type: string
        repository:
          type: string
        repository_id:
          type: string
        repository_owner:
          type: string
        repository_owner_id:
          type: string
        run_attempt:
          type: string
        run_id:
          type: string
        run_number:
          type: string
        runner_arch:
          type: string
        runner_os:
          type: string
        scenario_type:
          $ref: "#/components/schemas/AshkaalScenarioTypeGitHub"
        server_url:
          type: string
        sha:
          type: string
        triggering_actor:
          type: string
        updated_at:
          format: date-time
          type: string
        workflow:
          type: string
        workflow_ref:
          type: string
        workflow_sha:
          type: string
        workspace:
          type: string
      required:
        - action
        - actor
        - actor_id
        - created_at
        - event_name
        - id
        - job
        - ref
        - ref_name
        - ref_protected
        - ref_type
        - repository
        - repository_id
        - repository_owner
        - repository_owner_id
        - run_attempt
        - run_id
        - run_number
        - runner_arch
        - runner_os
        - scenario_type
        - server_url
        - sha
        - triggering_actor
        - updated_at
        - workflow
        - workflow_ref
        - workflow_sha
        - workspace
      type: object
    AshkaalScenarioHostOS:
      properties:
        arch:
          type: string
        hostname:
          type: string
        ip:
          type: string
        machine_id:
          type: string
        os:
          type: string
        scenario_type:
          $ref: "#/components/schemas/AshkaalScenarioTypeHostOS"
      required:
        - arch
        - hostname
        - ip
        - machine_id
        - os
        - scenario_type
      type: object
    AshkaalScenarioK8S:
      properties:
        cluster:
          type: string
        namespace:
          type: string
        node:
          type: string
        pod:
          type: string
        scenario_type:
          $ref: "#/components/schemas/AshkaalScenarioTypeK8S"
      required:
        - cluster
        - namespace
        - node
        - pod
        - scenario_type
      type: object
    AshkaalScenarioTypeGitHub:
      enum:
        - github
      type: string
    AshkaalScenarioTypeHostOS:
      enum:
        - hostos
      type: string
    AshkaalScenarioTypeK8S:
      enum:
        - k8s
      type: string
    AshkaalScenarios:
      properties:
        github:
          $ref: "#/components/schemas/AshkaalScenarioGitHub"
        hostos:
          $ref: "#/components/schemas/AshkaalScenarioHostOS"
        k8s:
          $ref: "#/components/schemas/AshkaalScenarioK8S"
      type: object
    AshkaalScore:
      properties:
        confidence:
          format: double
          type: number
        reasons:
          items:
            type: string
          type: array
        risk_score:
          format: double
          type: number
